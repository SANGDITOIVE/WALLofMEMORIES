<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Album - Memories Wall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Patrick Hand', cursive; }
        body { background: #f5ede0; }
        
        .scroll-container {
            position: relative;
            overflow: hidden;
            width: 100%;
            mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
        }
        
        .scroll-track {
            display: flex;
            gap: 1.5rem;
            padding: 2rem 1rem 1rem;
            width: max-content;
            will-change: transform;
            animation: scroll 45s linear infinite;
        }
        
        .scroll-track.paused {
            animation-play-state: paused;
        }
        
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        .polaroid {
            background: #fffdf7;
            padding: 0.5rem 0.5rem 1.5rem;
            box-shadow: 3px 4px 14px rgba(0,0,0,0.15);
            border-radius: 2px;
            width: clamp(130px, 25vw, 160px);
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .polaroid:hover {
            transform: translateY(-5px) !important;
            box-shadow: 8px 12px 28px rgba(233,30,140,0.25);
        }
        
        .polaroid img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }
        
        .pin {
            position: absolute;
            top: -1rem;
            left: 50%;
            transform: translateX(-50%);
            width: 1rem;
            height: 1.8rem;
            z-index: 2;
        }
        
        .pin-head {
            width: 1rem;
            height: 1rem;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #f9c0d0, #c2185b);
        }
        
        .pin-body {
            width: 0.3rem;
            height: 1rem;
            margin: 0 auto;
            background: linear-gradient(to bottom, #e91e8c, #880e4f);
            border-radius: 0 0 3px 3px;
        }
        
        .counter-card {
            background: linear-gradient(135deg, #fffdf7, #fce4ec);
            border: 2px solid #f8bbd0;
            border-radius: 1.5rem;
            padding: 1.5rem;
        }
        
        .invite-card {
            background: linear-gradient(135deg, #fffdf7, #fce4ec);
            border: 2px solid #f8bbd0;
            border-radius: 1.5rem;
            padding: 1.5rem;
        }
        
        .avatar-large {
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #e91e8c, #c8a96e);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        @media (min-width: 768px) {
            .polaroid { width: 180px; }
            .avatar-large { width: 3.5rem; height: 3.5rem; font-size: 1.4rem; }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Upload Modal -->
    <div id="uploadModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/40" onclick="closeUploadModal()"></div>
        <div class="relative z-10 w-full max-w-md bg-[#fdf6ec] rounded-3xl p-6 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl text-[#e91e8c]">💝 Thêm kỷ niệm</h2>
                <button onclick="closeUploadModal()" class="text-2xl text-[#b09070]">×</button>
            </div>
            
            <div id="dropZone" class="border-2 border-dashed border-[#e91e8c88] rounded-2xl p-6 text-center cursor-pointer hover:bg-[#fdf0f6] transition" onclick="document.getElementById('fileInput').click()">
                <span class="text-4xl">📷</span>
                <p class="text-[#a07840]">Nhấn để chọn hoặc kéo thả ảnh</p>
            </div>
            <input id="fileInput" type="file" accept="image/*" class="hidden">
            
            <div id="previewWrap" class="hidden mt-4">
                <img id="previewImg" src="" class="w-full rounded-xl max-h-52 object-cover">
            </div>
            
            <textarea id="photoNote" rows="2" maxlength="200" placeholder="Ghi chú..." class="w-full mt-4 rounded-xl border border-[#f8bbd0] p-3 text-[#6b5240] focus:outline-none focus:border-[#e91e8c]"></textarea>
            
            <button id="saveBtn" onclick="savePhoto()" class="w-full mt-4 py-3 rounded-2xl bg-[#e91e8c] text-white text-xl hover:bg-[#c2185b] transition active:scale-95">
                Lưu kỷ niệm 💝
            </button>
        </div>
    </div>

    <!-- Top Bar -->
    <header class="sticky top-0 z-40 bg-[#fdf6ec]/90 backdrop-blur-sm border-b border-[#f8bbd0] px-4 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="index.html" class="text-2xl text-[#e91e8c]">←</a>
            <h1 class="text-2xl md:text-3xl text-[#e91e8c]">💝 Couple Album</h1>
            <button id="uploadBtn" onclick="openUploadModal()" class="w-10 h-10 rounded-full bg-[#e91e8c] text-white text-xl font-bold hover:bg-[#c2185b] transition hidden">+</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- Loading State -->
        <div id="loadingState" class="text-center py-8">
            <p class="text-xl text-[#e8a0b4] animate-pulse">Đang tải...</p>
        </div>

        <!-- No Album State -->
        <div id="noAlbumState" class="hidden space-y-6 max-w-md mx-auto">
            <div class="text-center">
                <p class="text-6xl mb-4">💌</p>
                <h2 class="text-3xl text-[#e91e8c] mb-2">Bắt đầu album chung</h2>
                <p class="text-[#b09070]">Mời người yêu để cùng lưu giữ kỷ niệm</p>
            </div>
            
            <div class="invite-card space-y-4">
                <h3 class="text-2xl text-[#c2185b]">Mời người yêu</h3>
                <input id="inviteEmail" type="email" placeholder="email@example.com" class="w-full rounded-xl border border-[#f8bbd0] p-3 text-[#6b5240] focus:outline-none focus:border-[#e91e8c]">
                <button onclick="sendInvite()" class="w-full py-3 rounded-2xl bg-[#e91e8c] text-white text-xl hover:bg-[#c2185b] transition">Gửi lời mời 💌</button>
            </div>
            
            <div id="pendingInvites" class="hidden space-y-3"></div>
        </div>

        <!-- Has Album State -->
        <div id="hasAlbumState" class="hidden space-y-6">
            <!-- Partner Info -->
            <div class="flex items-center gap-4 p-4 bg-[#fdf6ec] rounded-2xl border border-[#f8bbd0]">
                <div id="partnerAvatar" class="avatar-large">?</div>
                <div>
                    <p id="partnerEmail" class="text-xl text-[#c2185b]">Partner</p>
                    <p class="text-sm text-[#b09070]">Album chung ✦</p>
                </div>
                <span id="photoCount" class="ml-auto px-3 py-1 bg-[#fce4ec] text-[#c2185b] rounded-full text-sm"></span>
            </div>

            <!-- Day Counter -->
            <div class="counter-card">
                <h3 class="text-2xl text-[#c2185b] mb-4">💕 Bộ đếm ngày</h3>
                
                <div id="counterDisplay" class="text-3xl text-center text-[#e91e8c] mb-4 hidden"></div>
                
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="date" id="anniversaryInput" class="flex-1 rounded-xl border border-[#f8bbd0] p-3 text-[#6b5240]">
                    <button onclick="saveAnniversary()" class="px-6 py-3 rounded-xl bg-[#e91e8c] text-white hover:bg-[#c2185b] transition whitespace-nowrap">
                        Lưu mốc
                    </button>
                </div>
            </div>

            <!-- Photo Wall -->
            <div class="scroll-container">
                <div id="photoWall" class="scroll-track"></div>
            </div>
            
            <div id="emptyPhotos" class="hidden text-center py-8">
                <p class="text-2xl text-[#e8a0b4] mb-2">Chưa có kỷ niệm</p>
                <p class="text-[#b09070]">Nhấn + để thêm ảnh đầu tiên</p>
            </div>
        </div>
    </main>

    <script>
        let currentAlbum = null;
        let selectedFile = null;
        
        function openUploadModal() {
            document.getElementById('uploadModal').classList.remove('hidden');
        }
        
        function closeUploadModal() {
            document.getElementById('uploadModal').classList.add('hidden');
            selectedFile = null;
            document.getElementById('previewWrap').classList.add('hidden');
            document.getElementById('photoNote').value = '';
        }
        
        // Drag & drop
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        
        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('bg-[#fdf0f6]');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('bg-[#fdf0f6]');
        });
        
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('bg-[#fdf0f6]');
            if (e.dataTransfer.files[0]) handleFileSelect(e.dataTransfer.files[0]);
        });
        
        fileInput.addEventListener('change', e => {
            if (e.target.files[0]) handleFileSelect(e.target.files[0]);
        });
        
        function handleFileSelect(file) {
            if (!file.type.startsWith('image/')) {
                alert('Vui lòng chọn file ảnh');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                alert('File quá lớn (tối đa 10 MB)');
                return;
            }
            
            selectedFile = file;
            const preview = document.getElementById('previewImg');
            preview.src = URL.createObjectURL(file);
            document.getElementById('previewWrap').classList.remove('hidden');
            dropZone.classList.add('hidden');
        }
    </script>

    <script type="module">
        const { createClient } = supabase;
        const sb = createClient(
            'https://ifarghceexpsfyfatjkb.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmYXJnaGNlZXhwc2Z5ZmF0amtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTkyNDQsImV4cCI6MjA4ODczNTI0NH0.QRxgy_NDmHGGNOP3Di-zW5LlDy_sKVdSjbGa2zjk2qQ'
        );

        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
            window.location.href = 'login.html';
            return;
        }
        
        const userId = session.user.id;
        const userEmail = session.user.email;
        
        document.getElementById('loadingState').classList.add('hidden');
        
        // Check for existing album
        const { data: albums } = await sb
            .from('couple_albums')
            .select('*')
            .or(`owner_id.eq.${userId},partner_id.eq.${userId}`);
        
        if (!albums?.length) {
            // No album - show invite UI
            document.getElementById('noAlbumState').classList.remove('hidden');
            
            // Check for pending invites
            const { data: pending } = await sb
                .from('couple_albums')
                .select('*')
                .eq('partner_email', userEmail)
                .is('partner_id', null);
            
            if (pending?.length) {
                document.getElementById('pendingInvites').classList.remove('hidden');
                const list = document.getElementById('pendingInvites');
                
                pending.forEach(inv => {
                    const div = document.createElement('div');
                    div.className = 'invite-card flex items-center justify-between';
                    div.innerHTML = `
                        <div>
                            <p class="text-[#c2185b]">Lời mời từ</p>
                            <p class="text-[#6b5240]">${inv.owner_email || 'Người dùng'}</p>
                        </div>
                        <button class="px-4 py-2 bg-[#e91e8c] text-white rounded-xl hover:bg-[#c2185b]" data-id="${inv.id}">
                            Chấp nhận
                        </button>
                    `;
                    
                    div.querySelector('button').addEventListener('click', async () => {
                        const { error } = await sb
                            .from('couple_albums')
                            .update({ partner_id: userId })
                            .eq('id', inv.id);
                        
                        if (error) {
                            alert('Lỗi: ' + error.message);
                        } else {
                            alert('Đã tham gia album!');
                            location.reload();
                        }
                    });
                    
                    list.appendChild(div);
                });
            }
            
            window.sendInvite = async function() {
                const email = document.getElementById('inviteEmail').value.trim();
                if (!email || !email.includes('@')) {
                    alert('Email không hợp lệ');
                    return;
                }
                
                const { error } = await sb
                    .from('couple_albums')
                    .insert({
                        owner_id: userId,
                        owner_email: userEmail,
                        partner_email: email,
                        partner_id: null
                    });
                
                if (error) {
                    alert('Lỗi: ' + error.message);
                } else {
                    alert('Đã gửi lời mời!');
                    document.getElementById('inviteEmail').value = '';
                }
            };
            
            return;
        }
        
        // Has album
        const album = albums[0];
        currentAlbum = album;
        
        document.getElementById('hasAlbumState').classList.remove('hidden');
        document.getElementById('uploadBtn').classList.remove('hidden');
        
        const isOwner = album.owner_id === userId;
        const partnerName = isOwner ? (album.partner_email || 'Partner') : (album.owner_email || 'Partner');
        
        document.getElementById('partnerEmail').textContent = partnerName;
        document.getElementById('partnerAvatar').textContent = partnerName[0].toUpperCase();
        
        // Day counter
        function updateCounter(dateStr) {
            const display = document.getElementById('counterDisplay');
            if (!dateStr) {
                display.classList.add('hidden');
                return;
            }
            
            const anniversary = new Date(dateStr + 'T00:00:00');
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const diffDays = Math.floor((today - anniversary) / (1000 * 60 * 60 * 24));
            const dayStr = `${anniversary.getDate()}/${anniversary.getMonth() + 1}/${anniversary.getFullYear()}`;
            
            if (diffDays >= 0) {
                display.textContent = `💕 Đã ${diffDays} ngày kể từ ${dayStr}`;
            } else {
                display.textContent = `⏳ Còn ${Math.abs(diffDays)} ngày đến ${dayStr}`;
            }
            
            display.classList.remove('hidden');
        }
        
        if (album.anniversary_date) {
            document.getElementById('anniversaryInput').value = album.anniversary_date;
            updateCounter(album.anniversary_date);
        }
        
        window.saveAnniversary = async function() {
            const date = document.getElementById('anniversaryInput').value;
            if (!date) {
                alert('Vui lòng chọn ngày');
                return;
            }
            
            const { error } = await sb
                .from('couple_albums')
                .update({ anniversary_date: date })
                .eq('id', album.id);
            
            if (error) {
                alert('Lỗi: ' + error.message);
            } else {
                updateCounter(date);
                alert('Đã lưu mốc ngày!');
            }
        };
        
        // Load photos
        const { data: photos } = await sb
            .from('couple_photos')
            .select('*')
            .eq('album_id', album.id)
            .order('created_at', { ascending: false });
        
        document.getElementById('photoCount').textContent = `${photos?.length || 0} ảnh`;
        
        if (!photos?.length) {
            document.getElementById('emptyPhotos').classList.remove('hidden');
        } else {
            const wall = document.getElementById('photoWall');
            const rotations = [-4, -2, 0, 2, 4, -3, 3, -1, 1];
            
            // Duplicate for seamless loop
            let displayPhotos = [...photos];
            while (displayPhotos.length < 8) {
                displayPhotos = [...displayPhotos, ...photos];
            }
            displayPhotos = [...displayPhotos, ...displayPhotos];
            
            displayPhotos.forEach((photo, i) => {
                const rotation = rotations[i % rotations.length];
                
                const card = document.createElement('div');
                card.className = 'polaroid';
                card.style.transform = `rotate(${rotation}deg)`;
                
                card.innerHTML = `
                    <div class="pin">
                        <div class="pin-head"></div>
                        <div class="pin-body"></div>
                    </div>
                    <img src="${photo.image_url}" alt="${photo.note || 'Memory'}" loading="lazy">
                    <p class="text-center text-sm text-[#6b5240] mt-2 truncate">${photo.note || '💝'}</p>
                `;
                
                card.addEventListener('click', () => {
                    window.location.href = `viewer.html?id=${photo.id}&source=couple&album=${album.id}`;
                });
                
                wall.appendChild(card);
            });
            
            // Pause on hover
            wall.addEventListener('mouseenter', () => wall.classList.add('paused'));
            wall.addEventListener('mouseleave', () => wall.classList.remove('paused'));
        }
        
        // Save photo
        window.savePhoto = async function() {
            if (!selectedFile) {
                alert('Vui lòng chọn ảnh');
                return;
            }
            
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = 'Đang lưu...';
            
            try {
                const ext = selectedFile.name.split('.').pop() || 'jpg';
                const photoId = crypto.randomUUID();
                const path = `couples/${album.id}/${photoId}.${ext}`;
                
                const { error: uploadError } = await sb.storage
                    .from('memories')
                    .upload(path, selectedFile);
                
                if (uploadError) throw uploadError;
                
                const { data: { publicUrl } } = sb.storage
                    .from('memories')
                    .getPublicUrl(path);
                
                const note = document.getElementById('photoNote').value.trim();
                
                const { error: dbError } = await sb
                    .from('couple_photos')
                    .insert({
                        album_id: album.id,
                        image_url: publicUrl,
                        note: note || null,
                        uploader_id: userId
                    });
                
                if (dbError) throw dbError;
                
                alert('Đã lưu!');
                location.reload();
            } catch (err) {
                console.error(err);
                alert('Lỗi: ' + err.message);
                btn.disabled = false;
                btn.textContent = 'Lưu kỷ niệm 💝';
            }
        };
    </script>
</body>
</html>
