<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Đăng nhập - Memories Wall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Patrick Hand', cursive; }
        body { 
            background: linear-gradient(135deg, #f5ede0 0%, #fdf6ec 100%);
            min-height: 100vh;
        }
        
        .login-card {
            background: rgba(255, 253, 247, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid #e8d5be;
            border-radius: 2rem;
            box-shadow: 0 20px 40px -15px rgba(139, 99, 67, 0.3);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .input-field {
            border: 2px solid #e8d5be;
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            background: white;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }
        
        .input-field:focus {
            border-color: #c8a96e;
            box-shadow: 0 0 0 4px rgba(200, 169, 110, 0.2);
            outline: none;
        }
        
        .login-btn {
            background: #c8a96e;
            border-radius: 1rem;
            padding: 0.75rem;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            width: 100%;
            cursor: pointer;
        }
        
        .login-btn:hover {
            background: #b8945a;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(200, 169, 110, 0.4);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .floating-icon {
            position: absolute;
            font-size: 2rem;
            opacity: 0.1;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        .icon-1 { top: 10%; left: 5%; animation-delay: 0s; }
        .icon-2 { bottom: 15%; right: 8%; animation-delay: 1s; }
        .icon-3 { top: 20%; right: 12%; animation-delay: 2s; }
        .icon-4 { bottom: 25%; left: 10%; animation-delay: 3s; }
    </style>
</head>
<body class="flex items-center justify-center p-4 relative">
    <!-- Floating decorations -->
    <div class="floating-icon icon-1">📸</div>
    <div class="floating-icon icon-2">💝</div>
    <div class="floating-icon icon-3">✨</div>
    <div class="floating-icon icon-4">🎞️</div>
    
    <!-- Main Login Card -->
    <div class="login-card w-full max-w-md p-8 relative z-10">
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <div class="text-6xl mb-4 animate-bounce">📸</div>
            <h1 class="text-4xl text-[#8B6343] font-bold tracking-wider">Memories Wall</h1>
            <p class="text-[#b09070] text-lg mt-2">Đăng nhập để tiếp tục</p>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm" class="space-y-5" onsubmit="handleLogin(event)">
            <!-- Email Field -->
            <div>
                <label class="block text-[#8B6343] text-lg mb-2 ml-1">Email</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-2xl text-[#c8a96e]">📧</span>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="your@email.com" 
                        class="input-field w-full pl-12"
                        required
                    >
                </div>
            </div>
            
            <!-- Password Field -->
            <div>
                <label class="block text-[#8B6343] text-lg mb-2 ml-1">Mật khẩu</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-2xl text-[#c8a96e]">🔒</span>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="••••••••" 
                        class="input-field w-full pl-12"
                        required
                    >
                </div>
            </div>
            
            <!-- Forgot Password Link -->
            <div class="text-right">
                <a href="#" class="text-[#c8a96e] hover:text-[#8B6343] text-sm transition">Quên mật khẩu?</a>
            </div>
            
            <!-- Login Button -->
            <button type="submit" class="login-btn mt-6">
                Đăng nhập ✦
            </button>
            
            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-[#e8d5be]"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-[#fdf6ec] text-[#b09070]">hoặc</span>
                </div>
            </div>
            
            <!-- Sign Up Link -->
            <p class="text-center text-[#b09070]">
                Chưa có tài khoản? 
                <a href="signup.html" class="text-[#c8a96e] font-semibold hover:text-[#8B6343] transition ml-1">
                    Đăng ký ngay ✨
                </a>
            </p>
        </form>
        
        <!-- Features List -->
        <div class="mt-8 pt-6 border-t border-[#e8d5be]">
            <div class="flex items-center gap-3 text-[#8B6343] mb-2">
                <span>✓</span>
                <span>Lưu giữ mọi khoảnh khắc</span>
            </div>
            <div class="flex items-center gap-3 text-[#8B6343] mb-2">
                <span>✓</span>
                <span>Chia sẻ với người thương</span>
            </div>
            <div class="flex items-center gap-3 text-[#8B6343]">
                <span>✓</span>
                <span>Hashtag và bộ lọc thông minh</span>
            </div>
        </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 translate-y-20 bg-[#3d2b1f] text-white px-6 py-3 rounded-full text-lg transition-transform duration-300 z-50 shadow-2xl">
        Thông báo
    </div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = "https://ifarghceexpsfyfatjkb.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmYXJnaGNlZXhwc2Z5ZmF0amtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTkyNDQsImV4cCI6MjA4ODczNTI0NH0.QRxgy_NDmHGGNOP3Di-zW5LlDy_sKVdSjbGa2zjk2qQ";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: {
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: true
            }
        });
        
        // Toast function
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.backgroundColor = isError ? '#b94040' : '#3d2b1f';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            
            setTimeout(() => {
                toast.style.transform = 'translateX(-50%) translateY(80px)';
            }, 3000);
        }
        
        // Handle login
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showToast('Vui lòng nhập email và mật khẩu', true);
                return;
            }
            
            // Disable button while processing
            const btn = document.querySelector('.login-btn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '⏳ Đang xử lý...';
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                showToast('Đăng nhập thành công! 🎉');
                
                // Redirect after success
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                
            } catch (error) {
                console.error('Login error:', error);
                showToast(error.message || 'Đăng nhập thất bại', true);
                
                // Re-enable button
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }
        
        // Check if already logged in
        window.addEventListener('load', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
