<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hashtag – Memories Wall</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Inter:wght@300;400;500&display=swap');
    * { box-sizing: border-box; }
    body { background: #f5ede0; font-family: 'Inter', sans-serif; }

    /* Masonry grid */
    .masonry { columns: 2; column-gap: 12px; }
    @media (min-width: 480px) { .masonry { columns: 3; } }
    @media (min-width: 640px) { .masonry { columns: 4; } }

    .masonry-item { break-inside: avoid; margin-bottom: 12px; cursor: pointer; }

    .polaroid { background: #fffdf7; padding: 8px 8px 28px; box-shadow: 2px 4px 12px rgba(0,0,0,0.15); border-radius: 2px; transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .polaroid:hover { transform: scale(1.04); box-shadow: 5px 8px 22px rgba(0,0,0,0.22); }
    .polaroid img { width: 100%; object-fit: cover; display: block; border-radius: 1px; }
    .polaroid .caption { font-family: 'Caveat', cursive; font-size: 12px; color: #6b5240; text-align: center; margin-top: 4px; line-height: 1.3; }

    .frame-retro     { border: 4px solid #8B6343 !important; }
    .frame-modern    { border: 2px solid #333 !important; border-radius: 6px !important; }
    .frame-christmas { border: 4px solid #c0392b !important; box-shadow: 0 0 0 2px #27ae60 !important; }
    .frame-valentine { border: 4px solid #e91e8c !important; }
    .frame-tet       { border: 4px solid #e53935 !important; box-shadow: 0 0 0 2px #ffd600 !important; }

    /* Related tags */
    .tag-chip { display: inline-block; background: #fffdf7; border: 1.5px solid #e8d5be; border-radius: 20px; padding: 3px 12px; font-family: 'Caveat', cursive; font-size: 14px; color: #8B6343; text-decoration: none; transition: background 0.15s; }
    .tag-chip:hover { background: #f0e0cc; }
    .tag-chip.active { background: #c8a96e; color: #fff; border-color: #a07840; }

    .skeleton { background: linear-gradient(90deg, #e8d5be 25%, #f5ede0 50%, #e8d5be 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body class="min-h-screen">

<header class="sticky top-0 z-40 flex items-center justify-between px-4 py-3 bg-[#fdf6ec]/90 backdrop-blur-sm border-b border-[#e8d5be]">
  <a href="index.html" class="text-[#8B6343] text-xl">←</a>
  <h1 class="font-['Caveat'] text-xl font-semibold text-[#8B6343]" id="page-title">#tag</h1>
  <div class="w-6"></div>
</header>

<main class="max-w-2xl mx-auto px-4 pt-4 pb-16 space-y-4">

  <!-- Related / All tags -->
  <div id="tags-row" class="flex flex-wrap gap-2 py-2"></div>

  <!-- Skeleton -->
  <div id="skeleton" class="masonry">
    <div class="masonry-item skeleton h-48 rounded-sm"></div>
    <div class="masonry-item skeleton h-36 rounded-sm"></div>
    <div class="masonry-item skeleton h-52 rounded-sm"></div>
    <div class="masonry-item skeleton h-40 rounded-sm"></div>
  </div>

  <!-- Grid -->
  <div id="masonry-grid" class="masonry hidden"></div>

  <!-- Empty -->
  <div id="empty-state" class="hidden text-center py-16">
    <p class="font-['Caveat'] text-2xl text-[#b09070]">No photos found 🍂</p>
    <a href="upload.html" class="text-sm text-[#8B6343] underline mt-2 inline-block">Upload a memory</a>
  </div>

</main>
