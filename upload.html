<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tải ảnh lên – Memories Wall</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap');
* { box-sizing: border-box; }
body { background: #f5ede0; font-family: 'Patrick Hand', cursive; }

#drop-zone { border:2.5px dashed #c8a96e; background:#fffdf7; transition:background .2s,border-color .2s; }
#drop-zone.dragover { background:#fdf0d8; border-color:#a07840; }

#preview-wrap { position:relative; display:inline-block; }
#preview-img  { display:block; max-width:100%; border-radius:2px; }

.frame-polaroid #preview-img { padding:10px 10px 36px; background:#fffdf7; box-shadow:3px 4px 14px rgba(0,0,0,.2); }
.frame-retro    #preview-img { border:6px solid #8B6343; }
.frame-modern   #preview-img { border:3px solid #333; border-radius:8px; }
.frame-christmas #preview-img { border:6px solid #c0392b; box-shadow:0 0 0 3px #27ae60; }
.frame-valentine #preview-img { border:6px solid #e91e8c; }
.frame-tet       #preview-img { border:6px solid #e53935; box-shadow:0 0 0 3px #ffd600; }

.frame-btn {
  padding:6px 14px; border-radius:20px; font-size:13px;
  border:1.5px solid #c8a96e; background:#fffdf7; color:#6b5240;
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.frame-btn:hover  { background:#f0e0cc; }
.frame-btn.active { background:#c8a96e; color:#fff; border-color:#a07840; }

.sticker-btn { font-size:1.6rem; padding:6px 10px; border-radius:10px; background:#fffdf7; border:1.5px solid #e8d5be; cursor:pointer; transition:transform .15s; }
.sticker-btn:hover { transform:scale(1.25); }

.sticker-on-img { position:absolute; font-size:1.8rem; cursor:move; user-select:none; touch-action:none; line-height:1; }

/* Hashtag chip (quick-tap) */
.htag-chip {
  padding:5px 14px; border-radius:20px; font-size:13px;
  border:1.5px solid #c8a96e; background:#fffdf7; color:#8B6343;
  cursor:pointer; transition:all .15s; font-family:'Caveat',cursive;
}
.htag-chip:hover  { background:#f0e0cc; }
.htag-chip.active { background:#c8a96e; color:#fff; border-color:#a07840; }

/* Tag pill */
.tag-pill { display:inline-flex; align-items:center; gap:4px; background:#f0e0cc; color:#6b5240; border-radius:20px; padding:3px 10px; font-size:13px; }
.tag-pill button { background:none; border:none; color:#a07840; cursor:pointer; font-size:15px; line-height:1; padding:0; }

#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#3d2b1f; color:#fff; padding:10px 22px; border-radius:24px; font-size:14px; transition:transform .3s ease; z-index:999; white-space:nowrap; }
#toast.show { transform:translateX(-50%) translateY(0); }

/* Date inputs */
.date-input { border:1.5px solid #e8d5be; background:#fffdf7; border-radius:10px; padding:8px 14px; font-size:14px; color:#6b5240; font-family:'Be Vietnam Pro',sans-serif; outline:none; }
.date-input:focus { border-color:#c8a96e; }
</style>
</head>
<body class="min-h-screen pb-16">

<header class="sticky top-0 z-40 flex items-center justify-between px-4 py-3 bg-[#fdf6ec]/90 backdrop-blur-sm border-b border-[#e8d5be]">
  <a href="index.html" class="text-[#8B6343] text-xl leading-none">←</a>
  <h1 class="font-['Caveat'] text-xl font-semibold text-[#8B6343]">✦ Tải ảnh lên</h1>
  <div class="w-6"></div>
</header>

<main class="max-w-lg mx-auto px-4 pt-6 space-y-6">

  <!-- Step 1: Drop zone -->
  <section>
    <p class="font-['Caveat'] text-lg text-[#8B6343] mb-2">① Chọn ảnh</p>
    <div id="drop-zone" class="rounded-2xl p-8 flex flex-col items-center justify-center gap-3 text-center cursor-pointer" onclick="document.getElementById('file-input').click()">
      <span class="text-4xl">📷</span>
      <p class="text-[#a07840] text-sm">Nhấn để chọn hoặc kéo thả ảnh vào đây</p>
      <p class="text-[#c8a96e] text-xs">JPG, PNG, WEBP – tối đa 10 MB</p>
    </div>
    <input id="file-input" type="file" accept="image/*" class="hidden" />
  </section>

  <!-- Customizer -->
  <div id="customizer" class="hidden space-y-6">

    <!-- Preview -->
    <section>
      <p class="font-['Caveat'] text-lg text-[#8B6343] mb-3">② Xem trước</p>
      <div class="flex justify-center">
        <div id="preview-wrap">
          <img id="preview-img" src="" alt="preview" class="max-h-72 w-auto" />
        </div>
      </div>
    </section>

    <!-- Frame -->
    <section>
      <p class="font-['Caveat'] text-lg text-[#8B6343] mb-2">③ Khung ảnh</p>
      <div class="flex flex-wrap gap-2">
        <button class="frame-btn active" data-frame="none"       onclick="setFrame(this)">Không có</button>
        <button class="frame-btn"        data-frame="polaroid"   onclick="setFrame(this)">Polaroid</button>
        <button class="frame-btn"        data-frame="retro"      onclick="setFrame(this)">Retro</button>
        <button class="frame-btn"        data-frame="modern"     onclick="setFrame(this)">Modern</button>
        <button class="frame-btn"        data-frame="christmas"  onclick="setFrame(this)">🎄 Giáng sinh</button>
        <button class="frame-btn"        data-frame="valentine"  onclick="setFrame(this)">💝 Valentine</button>
        <button class="frame-btn"        data-frame="tet"        onclick="setFrame(this)">🧧 Tết</button>
      </div>
    </section>

    <!-- Stickers -->
    <section>
      <p class="font-['Caveat'] text-lg text-[#8B6343] mb-2">④ Nhãn dán</p>
      <div class="flex gap-3 flex-wrap">
        <button class="sticker-btn" onclick="addSticker('❤️')">❤️</button>
        <button class="sticker-btn" onclick="addSticker('⭐')">⭐</button>
        <button class="sticker-btn" onclick="addSticker('✨')">✨</button>
        <button class="sticker-btn" onclick="addSticker('✈️')">✈️</button>
        <button class="sticker-btn" onclick="addSticker('🌸')">🌸</button>
        <button class="sticker-btn" onclick="addSticker('🎵')">🎵</button>
        <button class="sticker-btn" onclick="addSticker('📍')">📍</button>
        <button class="sticker-btn" onclick="addSticker('🌙')">🌙</button>
      </div>
      <p class="text-xs text-[#b09070] mt-1">Nhấn để thêm · kéo để đặt vị trí</p>
    </section>

    <!-- Note -->
    <section>
      <p class="font-['Caveat'] text-lg text-[#8B6343] mb-2">⑤ Ghi chú</p>
      <textarea id="note-input" rows="3" maxlength="200" placeholder="Viết gì đó về kỷ niệm này…"
        class="w-full rounded-xl border border-[#e8d5be] bg-[#fffdf7] px-4 py-3 text-sm text-[#6b5240] placeholder-[#c8a96e] resize-none focus:outline-none focus:border-[#c8a96e]"></textarea>
    </section>

    <!-- Ngày chụp -->
    <section>
      <p class="font-['Caveat'] text-lg text-[#8B6343] mb-2">⑥ Ngày chụp (tùy chọn)</p>
      <div class="flex items-center gap-2 flex-wrap">
        <input type="number" id="d-day"   class="date-input w-16" placeholder="Ngày" min="1" max="31" />
        <span class="text-[#c8a96e]">/</span>
        <input type="number" id="d-month" class="date-input w-16" placeholder="Tháng" min="1" max="12" />
        <span class="text-[#c8a96e]">/</span>
        <input type="number" id="d-year"  class="date-input w-24" placeholder="Năm" min="1900" max="2100" />
      </div>
      <p class="text-xs text-[#b09070] mt-1">Để trống nếu không muốn thêm</p>
    </section>

    <!-- Hashtags -->
    <section>
      <p class="font-['Caveat'] text-lg text-[#8B6343] mb-2">⑦ Hashtag</p>

      <!-- Quick chips -->
      <div class="mb-3">
        <p class="text-xs text-[#b09070] mb-2">Hashtag có sẵn (nhấn để chọn):</p>
        <div id="chip-container" class="flex flex-wrap gap-2">
          <!-- Preset chips -->
          <button class="htag-chip" data-tag="family" onclick="toggleChip(this,'family')">#family</button>
          <button class="htag-chip" onclick="toggleChip(this,'friends')">#friends</button>
          <button class="htag-chip" onclick="toggleChip(this,'travel')">#travel</button>
          <button class="htag-chip" onclick="toggleChip(this,'food')">#food</button>
          <button class="htag-chip" onclick="toggleChip(this,'memories')">#memories</button>
          <!-- User hashtags loaded dynamically below -->
        </div>
      </div>

      <!-- Custom input -->
      <div id="tag-list" class="flex flex-wrap gap-2 mb-2"></div>
      <div class="flex gap-2">
        <input id="tag-input" type="text" placeholder="#hashtag mới…" maxlength="30"
          class="flex-1 rounded-xl border border-[#e8d5be] bg-[#fffdf7] px-4 py-2 text-sm text-[#6b5240] placeholder-[#c8a96e] focus:outline-none focus:border-[#c8a96e]"
          onkeydown="handleTagKey(event)" />
        <button onclick="addTagFromInput()" class="px-4 py-2 rounded-xl bg-[#c8a96e] text-white text-sm hover:bg-[#a07840] transition">Thêm</button>
      </div>
    </section>

    <!-- Save -->
    <button id="save-btn" onclick="saveMemory()"
      class="w-full py-4 rounded-2xl bg-[#8B6343] hover:bg-[#6b4226] text-white font-['Caveat'] text-xl tracking-wide transition active:scale-95">
      Lưu kỷ niệm ✦
    </button>
  </div>
</main>

<div id="toast"></div>

<!-- UI helpers -->
<script>
let currentFrame = 'none';
const tags = []; // array of raw strings without #

function setFrame(btn) {
  document.querySelectorAll('.frame-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFrame = btn.dataset.frame;
  document.getElementById('preview-wrap').className = 'frame-' + currentFrame;
}

function addSticker(emoji) {
  const wrap = document.getElementById('preview-wrap');
  const el   = document.createElement('span');
  el.className   = 'sticker-on-img';
  el.textContent = emoji;
  el.style.left  = (30 + Math.random()*50) + '%';
  el.style.top   = (20 + Math.random()*50) + '%';
  el.addEventListener('mousedown', e => {
    e.preventDefault();
    const rect = wrap.getBoundingClientRect();
    const ox = e.clientX - el.getBoundingClientRect().left;
    const oy = e.clientY - el.getBoundingClientRect().top;
    const mv = ev => { el.style.left=((ev.clientX-rect.left-ox)/rect.width*100)+'%'; el.style.top=((ev.clientY-rect.top-oy)/rect.height*100)+'%'; };
    const up = () => { document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); };
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
  wrap.appendChild(el);
}

function renderTags() {
  const list = document.getElementById('tag-list');
  list.innerHTML = '';
  tags.forEach((tag, i) => {
    const pill = document.createElement('span');
    pill.className = 'tag-pill';
    pill.innerHTML = `#${tag} <button onclick="removeTag(${i})">×</button>`;
    list.appendChild(pill);
  });
}

function addTag(raw) {
  let t = raw.trim().replace(/\s+/g,'').replace(/^#+/,'').toLowerCase();
  if (!t) return;
  if (!tags.includes(t)) { tags.push(t); renderTags(); }
}

function removeTag(i) {
  const tag = tags[i];
  tags.splice(i, 1);
  renderTags();
  // Uncheck chip if exists
  document.querySelectorAll('.htag-chip').forEach(c => {
    if (c.dataset.tag === tag) c.classList.remove('active');
  });
}

function addTagFromInput() {
  const inp = document.getElementById('tag-input');
  addTag(inp.value); inp.value = '';
}
function handleTagKey(e) { if (e.key==='Enter') { e.preventDefault(); addTagFromInput(); } }

// Toggle chip: add or remove tag
function toggleChip(btn, tag) {
  if (btn.classList.contains('active')) {
    btn.classList.remove('active');
    const idx = tags.indexOf(tag);
    if (idx !== -1) { tags.splice(idx, 1); renderTags(); }
  } else {
    btn.classList.add('active');
    if (!tags.includes(tag)) { tags.push(tag); renderTags(); }
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Drag & drop
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', ()  => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); if(e.dataTransfer.files[0]) loadPreview(e.dataTransfer.files[0]); });
document.getElementById('file-input').addEventListener('change', e => { if(e.target.files[0]) loadPreview(e.target.files[0]); });

window.selectedFile = null;
function loadPreview(file) {
  if (!file.type.startsWith('image/')) { showToast('Vui lòng chọn file ảnh.'); return; }
  if (file.size > 10*1024*1024)        { showToast('File quá lớn (tối đa 10 MB).'); return; }
  window.selectedFile = file;
  document.getElementById('preview-img').src = URL.createObjectURL(file);
  document.getElementById('customizer').classList.remove('hidden');
  document.getElementById('drop-zone').classList.add('hidden');
  document.getElementById('customizer').scrollIntoView({ behavior:'smooth' });
}

// Auto-tag from ?category=
window.addEventListener('DOMContentLoaded', () => {
  const cat = new URLSearchParams(location.search).get('category');
  if (cat) addTag(cat);
});
</script>

<!-- Supabase module -->
<script type="module">
const { createClient } = supabase;
const sb = createClient(
  'https://ifarghceexpsfyfatjkb.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmYXJnaGNlZXhwc2Z5ZmF0amtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTkyNDQsImV4cCI6MjA4ODczNTI0NH0.QRxgy_NDmHGGNOP3Di-zW5LlDy_sKVdSjbGa2zjk2qQ'
);

const { data: { session } } = await sb.auth.getSession();
if (!session) { location.href = 'login.html'; }
const userId = session.user.id;

// Load user's existing hashtags as chips
const { data: photos } = await sb.from('photos').select('hashtags').eq('user_id', userId);
const existing = new Set(['family','friends','travel','food','memories']); // presets already added
(photos || []).forEach(p => (p.hashtags||[]).forEach(t => existing.add(t.replace('#','').toLowerCase())));

const chipContainer = document.getElementById('chip-container');
// Only add chips that aren't already in the preset list
const presetTags = new Set(['family','friends','travel','food','memories']);
[...existing].filter(t => !presetTags.has(t) && t).forEach(tag => {
  const btn = document.createElement('button');
  btn.className = 'htag-chip';
  btn.dataset.tag = tag;
  btn.textContent = '#' + tag;
  btn.setAttribute('onclick', `toggleChip(this,'${tag}')`);
  chipContainer.appendChild(btn);
});

// Add data-tag to preset chips too
document.querySelectorAll('.htag-chip').forEach(c => {
  if (!c.dataset.tag) {
    const t = c.textContent.replace('#','').trim();
    c.dataset.tag = t;
  }
});

// Save
window.saveMemory = async function() {
  if (!window.selectedFile) { showToast('Vui lòng chọn ảnh trước!'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Đang lưu…';

  try {
    const ext     = window.selectedFile.name.split('.').pop() || 'jpg';
    const photoId = crypto.randomUUID();
    const path    = `users/${userId}/${photoId}.${ext}`;

    const { error: upErr } = await sb.storage.from('memories').upload(path, window.selectedFile, { contentType: window.selectedFile.type });
    if (upErr) throw upErr;

    const { data: { publicUrl } } = sb.storage.from('memories').getPublicUrl(path);
    const note  = document.getElementById('note-input').value.trim();
    const frame = window.currentFrame === 'none' ? null : window.currentFrame;
    const stickers = Array.from(document.querySelectorAll('.sticker-on-img')).map(s => ({ emoji:s.textContent, left:s.style.left, top:s.style.top }));

    // Build photo_date
    let photo_date = null;
    const dd = parseInt(document.getElementById('d-day').value);
    const mm = parseInt(document.getElementById('d-month').value);
    const yy = parseInt(document.getElementById('d-year').value);
    if (dd && mm && yy && yy > 1900) {
      photo_date = `${yy}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    }

    // tags array → store as "#tag"
    const hashtagsToSave = tags.map(t => '#' + t);

    const { error: dbErr } = await sb.from('photos').insert({
      user_id  : userId,
      image_url: publicUrl,
      note     : note || null,
      hashtags : hashtagsToSave,
      frame    : frame,
      stickers : stickers.length ? stickers : null,
      photo_date: photo_date,
    });
    if (dbErr) throw dbErr;

    showToast('Đã lưu kỷ niệm! ✦');
    setTimeout(() => location.href = 'index.html', 1500);
  } catch(err) {
    console.error(err);
    showToast('Lỗi: ' + (err.message || 'Đã xảy ra lỗi.'));
    btn.disabled = false; btn.textContent = 'Lưu kỷ niệm ✦';
  }
};
</script>
</body>
</html>
